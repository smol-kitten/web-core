      - name: Push slimmed image to both registries
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          tags: |
            ${{ env.GITEA_IMAGE_PREFIX }}/prep_apache2:${{ matrix.version }}
            ${{ env.GITHUB_IMAGE_PREFIX }}/prep_apache2:${{ matrix.version }}

  build-prep-nginx-imagick:
    needs: build-prep-nginx
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version:
          - 24.04
          - 25.04
          - "25.10"
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
