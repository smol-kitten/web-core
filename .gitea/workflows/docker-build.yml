# Simplified 2-stage build pipeline for Gitea + GitHub dual-registry
# 1. Build and push builder images (prep_base)
# 2. Build and push runtime variants

name: Build Docker Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'

env:
  GITEA_REGISTRY: git.catboy.systems
  GITHUB_REGISTRY: ghcr.io
  GITEA_IMAGE_PREFIX: git.catboy.systems/${{ github.repository_owner }}
  GITHUB_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-builder:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version:
          - 24.04
          - 25.04
          - "25.10"
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push builder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_prep_base
          push: true
          tags: |
            ${{ env.GITEA_IMAGE_PREFIX }}/prep_base:${{ matrix.version }}
            ${{ env.GITHUB_IMAGE_PREFIX }}/prep_base:${{ matrix.version }}
          build-args: |
            BASE_IMAGE=ubuntu:${{ matrix.version }}

  build-variants:
    needs: build-builder
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        server:
          - nginx
          - apache2
        version:
          - 24.04
          - 25.04
          - "25.10"
        imagick:
          - true
          - false
        redis:
          - true
          - false
        memcached:
          - true
          - false
        ssh2:
          - true
          - false
        cron:
          - true
          - false
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set image metadata
        id: meta
        run: |
          VARIANT=""
          [ "${{ matrix.imagick }}" = "true" ] && VARIANT="${VARIANT}-imagick"
          [ "${{ matrix.redis }}" = "true" ] && VARIANT="${VARIANT}-redis"
          [ "${{ matrix.memcached }}" = "true" ] && VARIANT="${VARIANT}-memcached"
          [ "${{ matrix.ssh2 }}" = "true" ] && VARIANT="${VARIANT}-ssh2"
          [ "${{ matrix.cron }}" = "true" ] && VARIANT="${VARIANT}-cron"
          
          GITEA_TAG="${{ env.GITEA_IMAGE_PREFIX }}/${{ matrix.server }}:${{ matrix.version }}${VARIANT}"
          GITHUB_TAG="${{ env.GITHUB_IMAGE_PREFIX }}/${{ matrix.server }}:${{ matrix.version }}${VARIANT}"
          
          echo "gitea_tag=$GITEA_TAG" >> $GITHUB_OUTPUT
          echo "github_tag=$GITHUB_TAG" >> $GITHUB_OUTPUT
          echo "variant=$VARIANT" >> $GITHUB_OUTPUT
        shell: bash
      
      - name: Build and push variant image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_specific
          push: true
          tags: |
            ${{ steps.meta.outputs.gitea_tag }}
            ${{ steps.meta.outputs.github_tag }}
          build-args: |
            BUILDER_IMAGE=${{ env.GITEA_IMAGE_PREFIX }}/prep_base:${{ matrix.version }}
            UBUNTU_VERSION=${{ matrix.version }}
            SERVER_TYPE=${{ matrix.server }}
            INSTALL_IMAGICK=${{ matrix.imagick }}
            INSTALL_REDIS=${{ matrix.redis }}
            INSTALL_MEMCACHED=${{ matrix.memcached }}
            INSTALL_SSH2=${{ matrix.ssh2 }}
            INSTALL_CRON=${{ matrix.cron }}
