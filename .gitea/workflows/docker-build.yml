# Dual-registry build pipeline (Gitea + GitHub)
# 1. Resolve latest PHP 8.4.x from php.net
# 2. Build and push prep_base builder images
# 3. Build and push all runtime variants to both registries

name: Build Docker Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 03:00 UTC

env:
  GITEA_REGISTRY: git.catboy.systems
  GITHUB_REGISTRY: ghcr.io
  GITEA_PREFIX:    git.catboy.systems/${{ github.repository_owner }}
  GITHUB_PREFIX:   ghcr.io/${{ github.repository_owner }}

jobs:
  resolve-php-version:
    runs-on: self-hosted
    outputs:
      php_version: ${{ steps.php.outputs.version }}
    steps:
      - name: Fetch latest PHP 8.4.x version
        id: php
        run: |
          VERSION=$(curl -fsSL 'https://www.php.net/releases/index.php?json&version=8.4' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null \
            || echo "8.4.6")
          echo "Resolved PHP version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-builder:
    needs: resolve-php-version
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        version: [ "24.04", "25.04", "25.10" ]
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_prep_base
          push: true
          tags: |
            ${{ env.GITEA_PREFIX }}/prep_base:${{ matrix.version }}
            ${{ env.GITHUB_PREFIX }}/prep_base:${{ matrix.version }}
          build-args: |
            BASE_IMAGE=ubuntu:${{ matrix.version }}
            PHP_VERSION=${{ needs.resolve-php-version.outputs.php_version }}

  build-variants:
    needs: [ resolve-php-version, build-builder ]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        server:    [ nginx, apache2 ]
        version:   [ "24.04", "25.04", "25.10" ]
        imagick:   [ "true", "false" ]
        redis:     [ "true", "false" ]
        memcached: [ "true", "false" ]
        ssh2:      [ "true", "false" ]
        cron:      [ "true", "false" ]
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tag
        id: meta
        run: |
          TAG=""
          [ "${{ matrix.imagick }}"   = "true" ] && TAG="${TAG}-imagick"
          [ "${{ matrix.redis }}"     = "true" ] && TAG="${TAG}-redis"
          [ "${{ matrix.memcached }}" = "true" ] && TAG="${TAG}-memcached"
          [ "${{ matrix.ssh2 }}"      = "true" ] && TAG="${TAG}-ssh2"
          [ "${{ matrix.cron }}"      = "true" ] && TAG="${TAG}-cron"
          echo "gitea_tag=${{ env.GITEA_PREFIX }}/${{ matrix.server }}:${{ matrix.version }}${TAG}" >> "$GITHUB_OUTPUT"
          echo "github_tag=${{ env.GITHUB_PREFIX }}/${{ matrix.server }}:${{ matrix.version }}${TAG}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and push variant image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_specific
          push: true
          tags: |
            ${{ steps.meta.outputs.gitea_tag }}
            ${{ steps.meta.outputs.github_tag }}
          build-args: |
            BUILDER_IMAGE=${{ env.GITEA_PREFIX }}/prep_base:${{ matrix.version }}
            UBUNTU_VERSION=${{ matrix.version }}
            SERVER_TYPE=${{ matrix.server }}
            INSTALL_IMAGICK=${{ matrix.imagick }}
            INSTALL_REDIS=${{ matrix.redis }}
            INSTALL_MEMCACHED=${{ matrix.memcached }}
            INSTALL_SSH2=${{ matrix.ssh2 }}
            INSTALL_CRON=${{ matrix.cron }}
