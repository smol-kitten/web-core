      - name: Push slimmed image to both registries
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          tags: |
            ${{ env.GITEA_IMAGE_PREFIX }}/prep_nginx:${{ matrix.version }}
            ${{ env.GITHUB_IMAGE_PREFIX }}/prep_nginx:${{ matrix.version }}

  build-prep-apache:
    needs: build-prep-base
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version:
          - 24.04
          - 25.04
          - "25.10"
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build prep_apache2 image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_prep_apache2
          push: false
          load: true
          tags: prep_apache2:${{ matrix.version }}
          build-args: |
