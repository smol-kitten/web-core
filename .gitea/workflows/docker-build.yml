            ${{ env.GITHUB_IMAGE_PREFIX }}/prep_apache2_imagick:${{ matrix.version }}

  build-variants:
    needs: [build-prep-nginx-imagick, build-prep-apache-imagick]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        server:
          - nginx
          - apache2
        version:
          - 24.04
          - 25.04
          - "25.10"
        imagick:
          - true
          - false
        redis:
          - true
          - false
        memcached:
          - true
          - false
        ssh2:
          - true
          - false
        cron:
          - true
          - false
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set image metadata
        id: meta
        run: |
          # Build variant suffix from all extensions
          VARIANT=""
          PARTS=""
          
          [ "${{ matrix.imagick }}" = "true" ] && PARTS="${PARTS}-imagick"
          [ "${{ matrix.redis }}" = "true" ] && PARTS="${PARTS}-redis"
          [ "${{ matrix.memcached }}" = "true" ] && PARTS="${PARTS}-memcached"
          [ "${{ matrix.ssh2 }}" = "true" ] && PARTS="${PARTS}-ssh2"
          [ "${{ matrix.cron }}" = "true" ] && PARTS="${PARTS}-cron"
          
          VARIANT="${PARTS}"
          
          # Determine base image based on server type and imagick requirement
          if [ "${{ matrix.server }}" = "apache2" ]; then
            if [ "${{ matrix.imagick }}" = "true" ]; then
              BASE_PREP="prep_apache2_imagick"
            else
              BASE_PREP="prep_apache2"
            fi
          else
            if [ "${{ matrix.imagick }}" = "true" ]; then
              BASE_PREP="prep_nginx_imagick"
            else
              BASE_PREP="prep_nginx"
            fi
          fi
          
          LOCAL_TAG="${{ matrix.server }}:${{ matrix.version }}${VARIANT}"
          GITEA_TAG="${{ env.GITEA_IMAGE_PREFIX }}/${{ matrix.server }}:${{ matrix.version }}${VARIANT}"
          GITHUB_TAG="${{ env.GITHUB_IMAGE_PREFIX }}/${{ matrix.server }}:${{ matrix.version }}${VARIANT}"
          
          echo "local_tag=$LOCAL_TAG" >> $GITHUB_OUTPUT
          echo "gitea_tag=$GITEA_TAG" >> $GITHUB_OUTPUT
          echo "github_tag=$GITHUB_TAG" >> $GITHUB_OUTPUT
          echo "variant=$VARIANT" >> $GITHUB_OUTPUT
          echo "base_prep=$BASE_PREP" >> $GITHUB_OUTPUT
        shell: bash
      
      - name: Build variant image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_specific
          push: false
          load: true
          tags: ${{ steps.meta.outputs.local_tag }}
          build-args: |
            BASE_IMAGE=${{ env.GITEA_IMAGE_PREFIX }}/${{ steps.meta.outputs.base_prep }}:${{ matrix.version }}
            INSTALL_IMAGICK=${{ matrix.imagick }}
            INSTALL_REDIS=${{ matrix.redis }}
            INSTALL_MEMCACHED=${{ matrix.memcached }}
            INSTALL_SSH2=${{ matrix.ssh2 }}
            INSTALL_CRON=${{ matrix.cron }}
      
      - name: Slim the image
        uses: kitabisa/docker-slim-action@v1
        env:
          DSLIM_HTTP_PROBE: false
        with:
          target: ${{ steps.meta.outputs.local_tag }}
          tag: "slim"
      
      - name: Create Dockerfile for slimmed image push
        run: |
          LOCAL_TAG="${{ steps.meta.outputs.local_tag }}"
          BASE_NAME="${LOCAL_TAG%%:*}"
          echo "FROM ${BASE_NAME}:slim" > Dockerfile.slim
      
      - name: Push slimmed image to both registries
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          tags: |
            ${{ steps.meta.outputs.gitea_tag }}
            ${{ steps.meta.outputs.github_tag }}

  cleanup-untagged:
    needs: build-variants
    runs-on: self-hosted
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - name: Delete untagged images from Gitea registry
        run: |
          echo "Gitea registry cleanup would go here"
      
      - name: Delete untagged images from GitHub registry
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const packages = ['nginx', 'apache2', 'prep_base', 'prep_nginx', 'prep_apache2', 'prep_nginx_imagick', 'prep_apache2_imagick'];
            
            for (const packageName of packages) {
              try {
                const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                  package_type: 'container',
                  package_name: packageName,
                  org: context.repo.owner
                });
                
                const untaggedVersions = versions.data.filter(version => {
                  const tags = version.metadata.container.tags;
                  return !tags || tags.length === 0;
                });
                
                for (const version of untaggedVersions) {
                  console.log(`Deleting untagged version ${version.id} of package ${packageName}`);
                  try {
                    await github.rest.packages.deletePackageVersionForOrg({
                      package_type: 'container',
                      package_name: packageName,
                      org: context.repo.owner,
                      package_version_id: version.id
                    });
                    console.log(`  ✅ Deleted successfully`);
                  } catch (deleteError) {
                    console.log(`  ⚠️  Failed to delete: ${deleteError.message}`);
                  }
                }
                
                console.log(`✅ Cleaned up ${untaggedVersions.length} untagged versions from ${packageName}`);
              } catch (error) {
                console.log(`⚠️  Error cleaning up ${packageName}: ${error.message}`);
              }
            }
            console.log(`\n🎉 Cleanup complete!`);
