# This workflow builds multiple Docker image variants for different OS versions and features
# Multi-stage build: prep_base → prep_nginx/prep_apache2 → specific variants with imagick/phpdbg permutations
# Images are pushed to Gitea registry and mirrored to GitHub Container Registry
# Uses SlimToolkit to minimize image sizes

name: Build Docker Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sundays at 02:00 UTC

env:
  GITEA_REGISTRY: git.catboy.systems
  GITHUB_REGISTRY: ghcr.io
  GITEA_IMAGE_PREFIX: git.catboy.systems/${{ github.repository_owner }}
  GITHUB_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-prep-base:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version:
          - 24.04
          - 25.04
          - "25.10"
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build prep base image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_prep_base
          push: false
          load: true
          tags: prep_base:${{ matrix.version }}
          build-args: |
            BASE_IMAGE=ubuntu:${{ matrix.version }}
      
      - name: Slim the image
        uses: kitabisa/docker-slim-action@v1
        env:
          DSLIM_HTTP_PROBE: false
        with:
          target: prep_base:${{ matrix.version }}
          tag: "slim-${{ matrix.version }}"
      
      - name: Create Dockerfile for slimmed image push
        run: |
          echo "FROM prep_base:slim-${{ matrix.version }}" > Dockerfile.slim
      
      - name: Push slimmed image to both registries
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          tags: |
            ${{ env.GITEA_IMAGE_PREFIX }}/prep_base:${{ matrix.version }}
            ${{ env.GITHUB_IMAGE_PREFIX }}/prep_base:${{ matrix.version }}

  build-prep-nginx:
    needs: build-prep-base
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version:
          - 24.04
          - 25.04
          - "25.10"
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITEA_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_TOKEN }}
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ secrets.GITHUB_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build prep_nginx image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_prep_nginx
          push: false
          load: true
          tags: prep_nginx:${{ matrix.version }}
          build-args: |
            BASE_IMAGE=${{ env.GITEA_IMAGE_PREFIX }}/prep_base:${{ matrix.version }}
      
      - name: Slim the image
