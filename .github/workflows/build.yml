# Simplified 2-stage build pipeline:
# 1. Build and push builder images (prep_base) with compiled PHP + all extensions
# 2. Build and push runtime variants (small images using multi-stage COPY from builder)

name: Build Docker Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sundays at 02:00 UTC

jobs:
  build-builder:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version:
          - 24.04
          - 25.04
          - "25.10"
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Ensure buildx cache directories
        run: |
          sudo mkdir -p /home/runner/.cache/buildx/prep-base
          sudo chmod -R 0777 /home/runner/.cache/buildx || true
      
      - name: Build and push builder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_prep_base
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/prep_base:${{ matrix.version }}
          build-args: |
            BASE_IMAGE=ubuntu:${{ matrix.version }}
          cache-from: type=local,src=/home/runner/.cache/buildx/prep-base
          cache-to: type=local,dest=/home/runner/.cache/buildx/prep-base,mode=max

  build-variants:
    needs: build-builder
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        server:
          - nginx
          - apache2
        version:
          - 24.04
          - 25.04
          - "25.10"
        imagick:
          - true
          - false
        redis:
          - true
          - false
        memcached:
          - true
          - false
        ssh2:
          - true
          - false
        cron:
          - true
          - false
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set image metadata
        id: meta
        run: |
          VARIANT=""
          [ "${{ matrix.imagick }}" = "true" ] && VARIANT="${VARIANT}-imagick"
          [ "${{ matrix.redis }}" = "true" ] && VARIANT="${VARIANT}-redis"
          [ "${{ matrix.memcached }}" = "true" ] && VARIANT="${VARIANT}-memcached"
          [ "${{ matrix.ssh2 }}" = "true" ] && VARIANT="${VARIANT}-ssh2"
          [ "${{ matrix.cron }}" = "true" ] && VARIANT="${VARIANT}-cron"
          
          IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/${{ matrix.server }}:${{ matrix.version }}${VARIANT}"
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "variant=$VARIANT" >> $GITHUB_OUTPUT
        shell: bash
      
      - name: Build and push variant image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_specific
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          build-args: |
            BUILDER_IMAGE=ghcr.io/${{ github.repository_owner }}/prep_base:${{ matrix.version }}
            UBUNTU_VERSION=${{ matrix.version }}
            SERVER_TYPE=${{ matrix.server }}
            INSTALL_IMAGICK=${{ matrix.imagick }}
            INSTALL_REDIS=${{ matrix.redis }}
            INSTALL_MEMCACHED=${{ matrix.memcached }}
            INSTALL_SSH2=${{ matrix.ssh2 }}
            INSTALL_CRON=${{ matrix.cron }}
          cache-from: type=local,src=/home/runner/.cache/buildx/variants-${{ matrix.server }}

  cleanup-untagged:
    needs: build-variants
    runs-on: self-hosted
    if: always() && (github.event_name == 'push' || github.event_name == 'schedule')
    steps:
      - name: Delete untagged images from registry
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const packages = ['nginx', 'apache2', 'prep_base'];
            
            for (const packageName of packages) {
              try {
                const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                  package_type: 'container',
                  package_name: packageName,
                  org: context.repo.owner
                });
                
                const untaggedVersions = versions.data.filter(version => {
                  const tags = version.metadata.container.tags;
                  return !tags || tags.length === 0;
                });
                
                for (const version of untaggedVersions) {
                  console.log(`Deleting untagged version ${version.id} of package ${packageName}`);
                  try {
                    await github.rest.packages.deletePackageVersionForOrg({
                      package_type: 'container',
                      package_name: packageName,
                      org: context.repo.owner,
                      package_version_id: version.id
                    });
                    console.log(`  ✅ Deleted successfully`);
                  } catch (deleteError) {
                    console.log(`  ⚠️  Failed to delete: ${deleteError.message}`);
                  }
                }
                
                console.log(`✅ Cleaned up ${untaggedVersions.length} untagged versions from ${packageName}`);
              } catch (error) {
                console.log(`⚠️  Error cleaning up ${packageName}: ${error.message}`);
              }
            }
            console.log(`\n🎉 Cleanup complete!`);
