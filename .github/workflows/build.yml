# Full build pipeline:
# 1. Resolve the latest PHP 8.4.x release from php.net
# 2. Build and push builder images (prep_base) with compiled PHP + all extensions
# 3. Build and push all nginx runtime variants
# 4. Build and push static/SPA and Bun images
# 5. Scan a sample image with Trivy
# 6. Clean up untagged container versions
#
# Triggers:
#   push to main  — always run full build
#   weekly Sunday — always run full build (new PHP releases, fresh base layers)
#
# Base image hierarchy:
#   monthly-base.yml → ubuntu-base (GHCR mirror of Docker Hub ubuntu)
#   build.yml weekly → prep_base  (PHP compiled from source, built on ubuntu-base)
#   security-update.yml daily → runtime images (apt security patches, built on ubuntu-base)

name: Build Docker Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * 0'  # Weekly Sunday 04:00 UTC – full rebuild
  workflow_dispatch:
    inputs:
      php_version_override:
        description: 'Override PHP version (leave blank to auto-resolve latest 8.4.x)'
        required: false
        default: ''

jobs:
  # ------------------------------------------------------------------
  # Resolve latest PHP 8.4.x from php.net (avoids hardcoded versions)
  # ------------------------------------------------------------------
  resolve-php-version:
    runs-on: self-hosted
    outputs:
      php_version: ${{ steps.php.outputs.version }}
    steps:
      - name: Fetch latest PHP 8.4.x version
        id: php
        run: |
          OVERRIDE="${{ github.event.inputs.php_version_override }}"
          if [ -n "$OVERRIDE" ]; then
            VERSION="$OVERRIDE"
          else
            VERSION=$(curl -fsSL 'https://www.php.net/releases/index.php?json&version=8.4' \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null \
              || echo "8.4.6")
          fi
          echo "Resolved PHP version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Build and push prep_base (PHP compiled from source + all PECL exts)
  # Uses ubuntu-base from GHCR — never pulls from Docker Hub.
  # ------------------------------------------------------------------
  build-builder:
    needs: resolve-php-version
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        version: [ "24.04", "25.04", "25.10" ]
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure buildx cache directory
        run: |
          sudo mkdir -p /home/runner/.cache/buildx/prep-base
          sudo chmod -R 0777 /home/runner/.cache/buildx || true

      - name: Build and push builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_prep_base
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/prep_base:${{ matrix.version }}
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/ubuntu-base:${{ matrix.version }}
            PHP_VERSION=${{ needs.resolve-php-version.outputs.php_version }}
          cache-from: type=local,src=/home/runner/.cache/buildx/prep-base
          cache-to:   type=local,dest=/home/runner/.cache/buildx/prep-base,mode=max

  # ------------------------------------------------------------------
  # Build and push all nginx runtime variants (96 configs)
  # 1 server × 3 Ubuntu versions × 2^5 extension combos = 96
  # ------------------------------------------------------------------
  build-nginx:
    needs: [ resolve-php-version, build-builder ]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        version:   [ "24.04", "25.04", "25.10" ]
        imagick:   [ "true", "false" ]
        redis:     [ "true", "false" ]
        memcached: [ "true", "false" ]
        ssh2:      [ "true", "false" ]
        cron:      [ "true", "false" ]
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tag
        id: meta
        run: |
          TAG=""
          [ "${{ matrix.imagick }}"   = "true" ] && TAG="${TAG}-imagick"
          [ "${{ matrix.redis }}"     = "true" ] && TAG="${TAG}-redis"
          [ "${{ matrix.memcached }}" = "true" ] && TAG="${TAG}-memcached"
          [ "${{ matrix.ssh2 }}"      = "true" ] && TAG="${TAG}-ssh2"
          [ "${{ matrix.cron }}"      = "true" ] && TAG="${TAG}-cron"
          echo "image_tag=ghcr.io/${{ github.repository_owner }}/nginx:${{ matrix.version }}${TAG}" \
            >> "$GITHUB_OUTPUT"
          echo "cache_key=nginx-${{ matrix.version }}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Ensure buildx cache directory
        run: |
          sudo mkdir -p "/home/runner/.cache/buildx/variants-${{ steps.meta.outputs.cache_key }}"
          sudo chmod -R 0777 /home/runner/.cache/buildx || true

      - name: Build and push nginx variant image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_nginx
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          build-args: |
            BUILDER_IMAGE=ghcr.io/${{ github.repository_owner }}/prep_base:${{ matrix.version }}
            UBUNTU_IMAGE=ghcr.io/${{ github.repository_owner }}/ubuntu-base:${{ matrix.version }}
            INSTALL_IMAGICK=${{ matrix.imagick }}
            INSTALL_REDIS=${{ matrix.redis }}
            INSTALL_MEMCACHED=${{ matrix.memcached }}
            INSTALL_SSH2=${{ matrix.ssh2 }}
            INSTALL_CRON=${{ matrix.cron }}
          cache-from: type=local,src=/home/runner/.cache/buildx/variants-${{ steps.meta.outputs.cache_key }}
          cache-to:   type=local,dest=/home/runner/.cache/buildx/variants-${{ steps.meta.outputs.cache_key }},mode=max

  # ------------------------------------------------------------------
  # Build static / SPA images (no PHP, all ubuntu versions)
  # ------------------------------------------------------------------
  build-static:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version: [ "24.04", "25.04", "25.10" ]
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Ensure buildx cache directory
        run: |
          sudo mkdir -p /home/runner/.cache/buildx/static-${{ matrix.version }}
          sudo chmod -R 0777 /home/runner/.cache/buildx || true
      - name: Build and push static image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_static
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/static:${{ matrix.version }}
          build-args: UBUNTU_IMAGE=ghcr.io/${{ github.repository_owner }}/ubuntu-base:${{ matrix.version }}
          cache-from: type=local,src=/home/runner/.cache/buildx/static-${{ matrix.version }}
          cache-to:   type=local,dest=/home/runner/.cache/buildx/static-${{ matrix.version }},mode=max

  # ------------------------------------------------------------------
  # Build Bun edge runtime image
  # ------------------------------------------------------------------
  build-bun:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Ensure buildx cache directory
        run: |
          sudo mkdir -p /home/runner/.cache/buildx/bun
          sudo chmod -R 0777 /home/runner/.cache/buildx || true
      - name: Build and push Bun image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_bun
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bun:latest
          build-args: UBUNTU_IMAGE=ghcr.io/${{ github.repository_owner }}/ubuntu-base:24.04
          cache-from: type=local,src=/home/runner/.cache/buildx/bun
          cache-to:   type=local,dest=/home/runner/.cache/buildx/bun,mode=max

  # ------------------------------------------------------------------
  # Trivy vulnerability scan on a representative image
  # ------------------------------------------------------------------
  scan-images:
    needs: build-nginx
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version: [ "24.04", "25.04" ]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/nginx:${{ matrix.version }}-imagick
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ------------------------------------------------------------------
  # Remove untagged container versions from the registry
  # ------------------------------------------------------------------
  cleanup-untagged:
    needs: [ build-nginx, build-static, build-bun ]
    runs-on: self-hosted
    if: always()
    steps:
      - name: Delete untagged image versions
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const packages = ['nginx', 'static', 'bun', 'prep_base', 'ubuntu-base'];
            const owner = context.repo.owner;

            async function getVersions(packageName) {
              try {
                const res = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                  package_type: 'container', package_name: packageName, org: owner
                });
                return res.data;
              } catch {
                const res = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                  package_type: 'container', package_name: packageName, username: owner
                });
                return res.data;
              }
            }

            async function deleteVersion(packageName, versionId) {
              try {
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'container', package_name: packageName,
                  org: owner, package_version_id: versionId
                });
              } catch {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container', package_name: packageName,
                  username: owner, package_version_id: versionId
                });
              }
            }

            for (const pkg of packages) {
              try {
                const versions = await getVersions(pkg);
                const untagged = versions.filter(v => !v.metadata?.container?.tags?.length);
                console.log(`${pkg}: ${untagged.length} untagged version(s) to remove`);
                for (const v of untagged) {
                  try {
                    await deleteVersion(pkg, v.id);
                    console.log(`  Deleted version ${v.id}`);
                  } catch (e) {
                    console.log(`  Failed to delete ${v.id}: ${e.message}`);
                  }
                }
              } catch (e) {
                console.log(`Skipping ${pkg}: ${e.message}`);
              }
            }
