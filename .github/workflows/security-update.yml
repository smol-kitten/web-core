# Daily security update workflow
# Rebuilds only the runtime images (no PHP source compilation) so that
# OS-level security patches from apt are applied every day without the
# expensive prep_base rebuild.  prep_base is rebuilt weekly by build.yml.
#
# Uses ubuntu-base from GHCR (mirrored monthly by monthly-base.yml) so
# the runtime base layer is always from our own registry, never Docker Hub.

name: Daily Security Update

on:
  schedule:
    - cron: '0 2 * * *'  # Daily 02:00 UTC
  workflow_dispatch:

jobs:
  rebuild-nginx:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        version:   [ "24.04", "25.04", "25.10" ]
        imagick:   [ "true", "false" ]
        redis:     [ "true", "false" ]
        memcached: [ "true", "false" ]
        ssh2:      [ "true", "false" ]
        cron:      [ "true", "false" ]
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image tag
        id: meta
        run: |
          TAG=""
          [ "${{ matrix.imagick }}"   = "true" ] && TAG="${TAG}-imagick"
          [ "${{ matrix.redis }}"     = "true" ] && TAG="${TAG}-redis"
          [ "${{ matrix.memcached }}" = "true" ] && TAG="${TAG}-memcached"
          [ "${{ matrix.ssh2 }}"      = "true" ] && TAG="${TAG}-ssh2"
          [ "${{ matrix.cron }}"      = "true" ] && TAG="${TAG}-cron"
          echo "image_tag=ghcr.io/${{ github.repository_owner }}/nginx:${{ matrix.version }}${TAG}" \
            >> "$GITHUB_OUTPUT"
          echo "cache_key=nginx-${{ matrix.version }}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Rebuild nginx image with latest OS patches
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_nginx
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          build-args: |
            BUILDER_IMAGE=ghcr.io/${{ github.repository_owner }}/prep_base:${{ matrix.version }}
            UBUNTU_IMAGE=ghcr.io/${{ github.repository_owner }}/ubuntu-base:${{ matrix.version }}
            INSTALL_IMAGICK=${{ matrix.imagick }}
            INSTALL_REDIS=${{ matrix.redis }}
            INSTALL_MEMCACHED=${{ matrix.memcached }}
            INSTALL_SSH2=${{ matrix.ssh2 }}
            INSTALL_CRON=${{ matrix.cron }}
          cache-from: type=local,src=/home/runner/.cache/buildx/variants-${{ steps.meta.outputs.cache_key }}
          cache-to:   type=local,dest=/home/runner/.cache/buildx/variants-${{ steps.meta.outputs.cache_key }},mode=max

  # Daily rebuild of static/SPA images (OS security patches)
  rebuild-static:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version: [ "24.04", "25.04", "25.10" ]
    continue-on-error: ${{ matrix.version == '25.10' }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebuild static image with latest OS patches
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_static
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/static:${{ matrix.version }}
          build-args: UBUNTU_IMAGE=ghcr.io/${{ github.repository_owner }}/ubuntu-base:${{ matrix.version }}
          cache-from: type=local,src=/home/runner/.cache/buildx/static-${{ matrix.version }}
          cache-to:   type=local,dest=/home/runner/.cache/buildx/static-${{ matrix.version }},mode=max

  # Daily rebuild of Bun image (OS security patches)
  rebuild-bun:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebuild Bun image with latest OS patches
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile_bun
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bun:latest
          build-args: UBUNTU_IMAGE=ghcr.io/${{ github.repository_owner }}/ubuntu-base:24.04
          cache-from: type=local,src=/home/runner/.cache/buildx/bun
          cache-to:   type=local,dest=/home/runner/.cache/buildx/bun,mode=max

  # Scan after rebuild
  scan-images:
    needs: [ rebuild-nginx, rebuild-static, rebuild-bun ]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        version: [ "24.04", "25.04" ]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/nginx:${{ matrix.version }}-imagick
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
