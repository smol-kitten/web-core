      - PHP_MEMORY_LIMIT=128M
      - EXPOSE_SERVER_SOFTWARE=on
    depends_on:
      - prep-base-2504
    profiles: ["test-2504", "test-all"]

  # ========================================
  # Ubuntu 25.10 (Questing) Build Chain
  # ========================================
  
  prep-base-2510:
    build:
      context: .
      dockerfile: Dockerfile_prep_base
      args:
        BASE_IMAGE: dhi.io/ubuntu:25.10
    image: prep_base:25.10
