services:
  # Builder image (compiles PHP + all extensions)
  prep-base:
    build:
      context: .
      dockerfile: Dockerfile_prep_base
      args:
        BASE_IMAGE: ubuntu:24.04
    image: prep_base:24.04
    container_name: prep-base
    command: /bin/true
    profiles: ["build"]

  # Runtime nginx variant
  nginx:
    environment:
      - QUICK_SET=API
      - WEB_PORT=1234
      - EXPOSE_SERVER_SOFTWARE=false
    build:
      context: .
      dockerfile: Dockerfile_specific
      args:
        BUILDER_IMAGE: prep_base:24.04
        UBUNTU_VERSION: "24.04"
        SERVER_TYPE: nginx
    image: web_nginx:24.04
    container_name: web_nginx
    ports:
      - "8080:1234"
    restart: always
    depends_on:
      - prep-base
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep -P ':1234' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Runtime apache variant
  apache:
    environment:
      - QUICK_SET=CMS
    build:
      context: .
      dockerfile: Dockerfile_specific
      args:
        BUILDER_IMAGE: prep_base:24.04
        UBUNTU_VERSION: "24.04"
        SERVER_TYPE: apache2
    image: web_apache:24.04
    container_name: web_apache
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - prep-base
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep -P ':80' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
