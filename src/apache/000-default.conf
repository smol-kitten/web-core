<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        # No directory listing, no includes, no CGI exec
        Options -Indexes -Includes -ExecCGI
        AllowOverride All
        Require all granted
    </Directory>

    # Security headers (mod_headers required — enabled in Dockerfile)
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection       "1; mode=block"
    Header always set X-Frame-Options         "SAMEORIGIN"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"
    Header always set Permissions-Policy      "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

    # Cache headers for static assets
    <FilesMatch "\.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|webp)$">
        Header set Cache-Control "public, max-age=2592000, immutable"
    </FilesMatch>

    # Block access to sensitive file types
    <FilesMatch "(\.ini|\.log|\.conf|\.bak|\.swp|\.old|\.orig|\.sql|\.sh|\.inc|\.env|\.dmp)$">
        Require all denied
    </FilesMatch>

    # Block access to hidden directories (.git, .svn, etc.)
    <DirectoryMatch "\/\.">
        Require all denied
    </DirectoryMatch>

    # Internal PHP-FPM status endpoint — loopback only
    <Location /php-fpm-status>
        Require local
    </Location>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
