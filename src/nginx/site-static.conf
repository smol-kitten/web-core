server {
    listen 80 default_server;
    server_name _;
    root /var/www/html;
    index index.html;

    # Security headers (removable by entrypoint when SECURITY_HEADERS=false)
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy     "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Long-term cache for content-hashed assets (Vite, CRA, Next.js output)
    location ~* \.(js|mjs|css|woff2?|ttf|svg|webp|png|jpg|jpeg|ico|avif|gz|br)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback: unknown paths return index.html so client-side routing works.
    # Entrypoint replaces this with =404 when SPA_FALLBACK=false.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /nginx-status {
        stub_status;
        allow 127.0.0.1;
        deny  all;
        access_log off;
    }

    location ~ /\.(?!well-known) { deny all; }

    autoindex off;
}
