server {
    listen 80 reuseport default_server;
    server_name localhost _;
    root   /var/www/html;
    index  index.php index.htm index.html;

    access_log /var/log/nginx/access.log main buffer=512k flush=1m;
    error_log  /var/log/nginx/error.log warn;

    # ----------------------------------------------------------------
    # Security headers (individual headers can be removed by entrypoint
    # when SECURITY_HEADERS=false)
    # ----------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff"                            always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header X-Frame-Options         "SAMEORIGIN"                        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy      "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # ----------------------------------------------------------------
    # Static content — long cache headers
    # ----------------------------------------------------------------
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|webp)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ----------------------------------------------------------------
    # PHP via PHP-FPM
    # ----------------------------------------------------------------
    location ~ \.php$ {
        # Rate limiting (line is activated by entrypoint when RATE_LIMIT=true)
        # limit_req zone=req_limit burst=20 nodelay;
        # limit_conn conn_limit 20;

        try_files $uri =404;
        include snippets/fastcgi-php.conf;
        fastcgi_pass            unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_buffers         8 16k;
        fastcgi_buffer_size     32k;
        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 10;
        include fastcgi_params;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # ----------------------------------------------------------------
    # Internal monitoring endpoints — loopback only
    # ----------------------------------------------------------------
    location = /nginx-status {
        stub_status;
        allow 127.0.0.1;
        deny  all;
        access_log off;
    }

    location = /php-fpm-status {
        allow 127.0.0.1;
        deny  all;
        access_log off;
        fastcgi_pass            unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ----------------------------------------------------------------
    # Block access to sensitive paths
    # ----------------------------------------------------------------
    location ~ /\.(?!well-known) { deny all; }
    location ~ \.git             { deny all; }
    location ~ \.svn             { deny all; }
    location ~ \.conf\.php$      { deny all; }
    location ~* \.(ini|log|conf|bak|swp|old|orig|sql|sh|inc|env|dmp)$ {
        deny all;
    }

    autoindex off;
}
